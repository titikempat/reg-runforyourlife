<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RUN FOR YOUR LIFE 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#06152d;
color:white;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:#0d2347;
border-radius:24px;
overflow:hidden;
box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.banner{
width:100%;
height:320px;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url('https://images.unsplash.com/photo-1552674605-db6ffd4facb5?q=80&w=1600');
background-size:cover;
background-position:center;
position:relative;
}

.banner-content{
position:absolute;
bottom:30px;
left:30px;
}

.banner-content h1{
font-size:52px;
color:#f6c453;
line-height:1;
font-weight:700;
}

.banner-content p{
margin-top:10px;
font-size:18px;
}

.form-section{
padding:30px;
}

.info-box{
background:#132f5e;
padding:22px;
border-radius:18px;
margin-bottom:30px;
line-height:1.9;
}

.section-title{
color:#f6c453;
margin-bottom:25px;
font-size:25px;
border-left:5px solid #f6c453;
padding-left:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.input-group{
display:flex;
flex-direction:column;
}

.input-group label{
margin-bottom:8px;
font-weight:500;
}

.input-group input,
.input-group select,
.input-group textarea{
padding:14px;
border:none;
border-radius:14px;
background:#132f5e;
color:white;
font-size:15px;
}

.input-group textarea{
resize:none;
}

.full{
grid-column:1/3;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#f6c453;
color:#06152d;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

button:disabled{
opacity:0.7;
cursor:not-allowed;
}

.success{
display:none;
margin-top:30px;
background:#10391e;
padding:25px;
border-radius:16px;
}

.loading{
display:none;
margin-top:20px;
text-align:center;
color:#f6c453;
font-size:16px;
}

.hidden{
display:none;
}

.peserta-card{
background:#132f5e;
padding:24px;
border-radius:18px;
margin-bottom:25px;
}

.peserta-title{
font-size:22px;
font-weight:700;
margin-bottom:20px;
color:#f6c453;
}

@media(max-width:768px){

.grid{
grid-template-columns:1fr;
}

.full{
grid-column:auto;
}

.banner{
height:240px;
}

.banner-content h1{
font-size:34px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="banner">

<div class="banner-content">
<h1>RUN FOR YOUR LIFE 2026</h1>
<p>MOJO HEALTH FEST 2026</p>
</div>

</div>

<div class="form-section">

<div class="info-box">

📍 Taman Bahari Mojopahit Kota Mojokerto<br>
📅 27 September 2026<br>
⏰ Start 06.00 WIB<br>
🏃 Kategori 3K & 5K

</div>

<h2 class="section-title">
FORM REGISTRASI PESERTA
</h2>

<form id="registerForm">

<div class="input-group full">

<label>Tipe Pendaftaran</label>

<select id="tipeDaftar">

<option value="Individu">
Individu
</option>

<option value="Kelompok">
Kelompok
</option>

</select>

</div>

<div class="input-group full">

<label>Peserta</label>

<select id="komunitas">

<option value="Umum">
Umum
</option>

<option value="Komunitas">
Komunitas
</option>

</select>

</div>

<div
class="input-group full hidden"
id="komunitasBox">

<label>Nama Komunitas</label>

<input
type="text"
id="namaKomunitas">

</div>

<div id="pesertaContainer"></div>

<button
type="button"
id="tambahPeserta"
style="
margin-top:20px;
margin-bottom:20px;
background:#132f5e;
color:white;
">

+ Tambah Peserta

</button>

<div class="input-group full">

<label>Total Pembayaran</label>

<input
type="text"
id="harga"
readonly>

</div>

<div class="input-group full">

<label>Metode Pembayaran</label>

<select id="metodeBayar">

<option value="">
Pilih
</option>

<option value="Transfer Bank">
Transfer Bank
</option>

<option value="QRIS">
QRIS
</option>

</select>

</div>

<div class="input-group full">

<label>

<input type="checkbox" required>

Saya menyetujui syarat dan ketentuan event

</label>

</div>

<div class="full">

<button
type="submit"
id="submitBtn">

DAFTAR SEKARANG

</button>

</div>

</form>

<div class="loading" id="loading">
⏳ Sedang mengirim data...
</div>

<div class="success" id="successBox">

<h2>
✅ REGISTRASI BERHASIL
</h2>

<div id="successText"></div>

</div>

</div>

</div>

<script>

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbwr5NReGwYtYWt7hvx4Kw_LwAEZ2d0hVj3WGUPxfYzDXfFO8tno8w-PBO026at7ZNAcaw/exec";

const pesertaContainer =
document.getElementById("pesertaContainer");

const tambahPesertaBtn =
document.getElementById("tambahPeserta");

const komunitas =
document.getElementById("komunitas");

const komunitasBox =
document.getElementById("komunitasBox");

const hargaInput =
document.getElementById("harga");

let pesertaCount = 0;

let configData = null;

// =====================================
// LOAD CONFIG
// =====================================

async function loadConfig(){

const res =
await fetch(
WEBAPP_URL + "?action=config"
);

configData =
await res.json();

createPeserta();

}

loadConfig();

// =====================================
// KOMUNITAS
// =====================================

komunitas.addEventListener(
"change",
function(){

if(this.value == "Komunitas"){

komunitasBox
.classList
.remove("hidden");

}else{

komunitasBox
.classList
.add("hidden");

}

}
);

// =====================================
// FORMAT RUPIAH
// =====================================

function rupiah(angka){

return new Intl
.NumberFormat("id-ID")
.format(angka);

}

// =====================================
// HARGA
// =====================================

function getHarga(
kategori,
batch
){

if(
kategori == "3K" &&
batch == "Earlybird"
){
return 75000;
}

if(
kategori == "3K" &&
batch == "Regular"
){
return 100000;
}

if(
kategori == "5K" &&
batch == "Earlybird"
){
return 125000;
}

if(
kategori == "5K" &&
batch == "Regular"
){
return 150000;
}

return 0;

}

// =====================================
// UPDATE TOTAL
// =====================================

function updateTotal(){

let total = 0;

document
.querySelectorAll(".kategori")
.forEach((kat,index)=>{

const batch =
document
.querySelectorAll(".batch")[index]
.value;

total +=
getHarga(
kat.value,
batch
);

});

hargaInput.value =
"Rp " + rupiah(total);

}

// =====================================
// CREATE PESERTA
// =====================================

function createPeserta(){

pesertaCount++;

const div =
document.createElement("div");

div.className =
"peserta-card";

div.innerHTML = `

<div class="peserta-title">
Peserta ${pesertaCount}
</div>

<div class="grid">

<div class="input-group">
<label>Nama Lengkap</label>
<input type="text" class="namaLengkap" required>
</div>

<div class="input-group">
<label>NIK</label>
<input
type="text"
class="nik"
maxlength="16"
required>
</div>

<div class="input-group">
<label>Nama BIB</label>
<input type="text" class="namaBib" required>
</div>

<div class="input-group">
<label>Tanggal Lahir</label>
<input
type="date"
class="tanggalLahir"
required>
</div>

<div class="input-group">

<label>Jenis Kelamin</label>

<select class="jenisKelamin" required>

<option value="">
Pilih
</option>

<option value="Laki-laki">
Laki-laki
</option>

<option value="Perempuan">
Perempuan
</option>

</select>

</div>

<div class="input-group">
<label>WhatsApp</label>
<input
type="text"
class="wa"
required>
</div>

<div class="input-group">
<label>Email</label>
<input
type="email"
class="email"
required>
</div>

<div class="input-group">
<label>Kota</label>
<input
type="text"
class="kota"
required>
</div>

<div class="input-group">

<label>Kategori</label>

<select
class="kategori"
required>

<option value="">
Pilih
</option>

<option value="3K">
3K
</option>

<option value="5K">
5K
</option>

</select>

</div>

<div class="input-group">

<label>Batch</label>

<select
class="batch"
required>

<option value="">
Pilih
</option>

${
configData &&
configData.earlybirdAktif
? `
<option value="Earlybird">
Earlybird
</option>
`
: ""
}

<option value="Regular">
Regular
</option>

</select>

</div>

<div class="input-group">

<label>Ukuran Jersey</label>

<select
class="jersey"
required>

<option value="">
Pilih
</option>

<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>

</select>

</div>

<div class="input-group">

<label>Golongan Darah</label>

<select class="goldar">

<option value="">
Pilih
</option>

<option>A</option>
<option>B</option>
<option>AB</option>
<option>O</option>

</select>

</div>

<div class="input-group full">

<label>Riwayat Penyakit</label>

<textarea
class="riwayat"
rows="3"></textarea>

</div>

<div class="input-group">

<label>Kontak Darurat</label>

<input
type="text"
class="kontakDarurat">

</div>

</div>

`;

pesertaContainer
.appendChild(div);

// AUTO TANGGAL DARI NIK

const nikInput =
div.querySelector(".nik");

const tanggalInput =
div.querySelector(".tanggalLahir");

nikInput.addEventListener(
"input",
function(){

const nik =
this.value;

if(nik.length == 16){

let tanggal =
parseInt(
nik.substring(6,8)
);

let bulan =
parseInt(
nik.substring(8,10)
);

let tahun =
parseInt(
nik.substring(10,12)
);

if(tanggal > 40){
tanggal -= 40;
}

const tahunNow =
new Date()
.getFullYear() % 100;

if(tahun <= tahunNow){
tahun = 2000 + tahun;
}else{
tahun = 1900 + tahun;
}

tanggalInput.value =
`${tahun}-${String(bulan).padStart(2,"0")}-${String(tanggal).padStart(2,"0")}`;

}

}
);

div
.querySelector(".kategori")
.addEventListener(
"change",
updateTotal
);

div
.querySelector(".batch")
.addEventListener(
"change",
updateTotal
);

}

// =====================================
// TAMBAH PESERTA
// =====================================

tambahPesertaBtn
.addEventListener(
"click",
createPeserta
);

// =====================================
// SUBMIT
// =====================================

document
.getElementById("registerForm")
.addEventListener(
"submit",
async function(e){

e.preventDefault();

document
.getElementById("loading")
.style.display = "block";

document
.getElementById("submitBtn")
.disabled = true;

const peserta = [];

document
.querySelectorAll(".peserta-card")
.forEach(card => {

peserta.push({

namaLengkap :
card.querySelector(".namaLengkap").value,

nik :
card.querySelector(".nik").value,

namaBib :
card.querySelector(".namaBib").value,

tanggalLahir :
card.querySelector(".tanggalLahir").value,

jenisKelamin :
card.querySelector(".jenisKelamin").value,

wa :
card.querySelector(".wa").value,

email :
card.querySelector(".email").value,

kota :
card.querySelector(".kota").value,

kategori :
card.querySelector(".kategori").value,

batch :
card.querySelector(".batch").value,

jersey :
card.querySelector(".jersey").value,

goldar :
card.querySelector(".goldar").value,

riwayat :
card.querySelector(".riwayat").value,

kontakDarurat :
card.querySelector(".kontakDarurat").value,

komunitas :
document.getElementById("komunitas").value,

namaKomunitas :
document.getElementById("namaKomunitas").value,

metodeBayar :
document.getElementById("metodeBayar").value

});

});

try{

const response =
await fetch(
WEBAPP_URL,
{

method:"POST",

headers:{
"Content-Type":
"text/plain;charset=utf-8"
},

body:JSON.stringify({

peserta : peserta

})

}
);

const res =
await response.json();

document
.getElementById("loading")
.style.display = "none";

document
.getElementById("submitBtn")
.disabled = false;

if(res.status == "success"){

document
.getElementById("successBox")
.style.display = "block";

let nomorWA =
peserta[0].wa
.replace(/\D/g,'');

if(
nomorWA.startsWith("0")
){

nomorWA =
"62" +
nomorWA.substring(1);

}

let bibText = "";

res.bib.forEach(b => {

bibText += `• ${b}\n`;

});

const pesan =
encodeURIComponent(

`✅ REGISTRASI BERHASIL

RUN FOR YOUR LIFE 2026

Register ID :
${res.registerId}

BIB PESERTA :
${bibText}

Jumlah Peserta :
${res.jumlahPeserta}

Total Pembayaran :
Rp ${rupiah(res.harga)}

💳 PEMBAYARAN

Bank Jatim
0162123456

Upload bukti transfer:
https://forms.gle/DgjCQF4w8h9rYBLq7

Terima kasih 🙏`

);

const waLink =
`https://wa.me/${nomorWA}?text=${pesan}`;

document
.getElementById("successText")
.innerHTML = `

<div style="
background:#0b1f3d;
padding:22px;
border-radius:18px;
line-height:1.9;
">

<b>Register ID :</b>
${res.registerId}<br><br>

<b>BIB :</b><br>
${res.bib.join("<br>")}<br><br>

<b>Jumlah Peserta :</b>
${res.jumlahPeserta}<br>

<b>Total :</b>
Rp ${rupiah(res.harga)}

</div>

<a
href="${waLink}"
target="_blank"
style="
display:block;
margin-top:20px;
padding:16px;
background:#25D366;
border-radius:14px;
text-align:center;
text-decoration:none;
font-weight:700;
color:white;
">

Kirim ke WhatsApp

</a>

`;

window.scrollTo({

top :
document.body.scrollHeight,

behavior :
"smooth"

});

}else{

alert(res.message);

}

}catch(err){

document
.getElementById("loading")
.style.display = "none";

document
.getElementById("submitBtn")
.disabled = false;

alert(err.message);

}

}
);

</script>

</body>
</html>
